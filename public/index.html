<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCI Cart</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #872434; }
    .product { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    .cart-item { display: flex; justify-content: space-between; padding: 10px; background: #f9f9f9; margin: 5px 0; }
    button { background: #114B5F; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px; }
    button.remove { background: #872434; }
    #total { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>Cloud Store 893</h1>

  <h2>Products</h2>
  <div id="products"></div>

  <h2>Your Cart</h2>
  <div id="cart"></div>
  <div id="total"></div>

  <script>
    async function loadProducts() {
      const res = await fetch('/api/products');
      const products = await res.json();
      document.getElementById('products').innerHTML = products.map(p => `
        <div class="product">
          <span>${p.name} — $${p.price.toFixed(2)}</span>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      `).join('');
    }

    async function loadCart() {
      const res = await fetch('/api/cart');
      const cart = await res.json();
      const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
      document.getElementById('cart').innerHTML = cart.length === 0
        ? '<p>Cart is empty</p>'
        : cart.map(item => `
          <div class="cart-item">
            <span>${item.name} x${item.quantity} — $${(item.price * item.quantity).toFixed(2)}</span>
            <button class="remove" onclick="removeFromCart(${item.id})">Remove</button>
          </div>
        `).join('');
      document.getElementById('total').textContent = cart.length
        ? `Total: $${total.toFixed(2)}` : '';
    }

    async function addToCart(productId) {
      await fetch('/api/cart', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ productId })
      });
      loadCart();
    }

    async function removeFromCart(id) {
      await fetch(`/api/cart/${id}`, { method: 'DELETE' });
      loadCart();
    }

    loadProducts();
    loadCart();
  </script>
</body>
</html>

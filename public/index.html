<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Cloud Store 893 POS</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="topbar">
    <h1>Cloud Store 893 POS</h1>
    <div id="status" class="status">Ready</div>
  </header>

  <main class="pos-layout">
    <section>
      <h2>Products</h2>
      <div id="products" class="products-grid"></div>
    </section>

    <aside class="cart-panel">
      <h2>Current Sale</h2>
      <label for="customerSelect" class="field-label">Customer</label>
      <select id="customerSelect" class="customer-select"></select>
      <div id="cart"></div>
      <div class="cart-footer">
        <div id="total" class="total"></div>
        <label for="paymentMethod">Payment</label>
        <select id="paymentMethod">
          <option value="card">Card</option>
          <option value="cash">Cash</option>
          <option value="mobile">Mobile Pay</option>
        </select>
        <button id="checkoutBtn" class="checkout">Complete Sale</button>
      </div>
    </aside>
  </main>

  <section class="history-wrap">
    <h2>Recent Sales</h2>
    <div id="salesHistory"></div>
  </section>

  <script src="/app.js"></script>
</body>
</html>

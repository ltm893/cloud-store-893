<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="screen-orientation" content="landscape">
  <title>Admin sign in — Cloud Store 893</title>
  <script src="/admin/admin-orientation.js?v=20260611b"></script>
  <link rel="stylesheet" href="/admin/admin.css?v=20260620d">
  <style>
    :root {
      --bg: #faf3df;
      --panel: #fff;
      --accent: #872434;
      --accent-2: #114b5f;
      --danger: #b42318;
      --text: #1f2937;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e5e7eb;
    }
    .card.card-wide {
      max-width: 960px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      color: var(--accent);
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
    }
    button, .btn {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: inline-block;
    }
    .btn-oracle {
      background: var(--accent-2);
      color: #fff;
    }
    .btn-pin {
      background: var(--accent);
      color: #fff;
    }
    .divider {
      margin: 18px 0;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
    #loginStatus {
      min-height: 1.2em;
      margin-top: 8px;
      font-size: 0.85rem;
      color: var(--danger);
    }
    .portrait-blocker {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      background: var(--bg);
      color: var(--text);
    }
    .portrait-blocker p { margin: 0; max-width: 280px; font-size: 1.1rem; }
    .portrait-blocker span { font-size: 2.5rem; }
    @media (orientation: portrait) {
      html.admin-fine-pointer .portrait-blocker,
      html.admin-portrait-ok .portrait-blocker { display: none !important; }
      html.admin-fine-pointer body.admin-landscape > :not(.portrait-blocker),
      html.admin-portrait-ok body.admin-landscape > :not(.portrait-blocker) { visibility: visible !important; }
      html:not(.admin-fine-pointer):not(.admin-portrait-ok) .portrait-blocker { display: flex; }
      html:not(.admin-fine-pointer):not(.admin-portrait-ok) body.admin-landscape > :not(.portrait-blocker) { visibility: hidden; }
    }
  </style>
</head>
<body class="admin-landscape">
  <div id="portraitBlocker" class="portrait-blocker" role="dialog" aria-label="Rotate device">
    <span aria-hidden="true">↻</span>
    <p>Rotate your device to <strong>landscape</strong> to use Admin.</p>
  </div>
  <div class="card" id="loginCard">
    <h1>Cloud Store 893</h1>
    <nav class="login-tabs" aria-label="Sign in sections">
      <button type="button" class="login-tab-btn active" data-login-tab="signin" id="signInTabBtn">Sign in</button>
      <button type="button" class="login-tab-btn" data-login-tab="systems" id="systemsTabBtn">Platform</button>
    </nav>

    <div id="signInPanel">
      <p id="loginHint">Choose how to sign in.</p>

      <div id="idpBlock" hidden>
        <a id="idpLoginLink" class="btn btn-oracle" href="/oauth/admin/login?prompt=login">Sign in with Oracle</a>
        <p style="font-size: 0.8rem; margin-top: 10px;">Uses your store Oracle account. Add <code>?prompt=login</code> to force username/password.</p>
      </div>

      <div id="pinBlock" hidden>
        <div class="divider" id="pinDivider" hidden>or use admin PIN</div>
        <form id="loginForm">
          <label for="pin">Admin PIN</label>
          <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password">
          <p id="error" style="color: var(--danger); min-height: 1.2em; margin-top: 10px; margin-bottom: 0;"></p>
          <button type="submit" class="btn-pin">Sign in with PIN</button>
        </form>
      </div>
    </div>

    <section id="systemsPanel" class="login-systems-panel systems-panel" hidden>
      <div class="systems-intro-row">
        <div class="systems-description-card">
          <h2 class="systems-card-title">Description</h2>
          <p id="systemsOverview" class="systems-description-text"></p>
        </div>
        <div class="systems-updated-card">
          <h2 class="systems-card-title">Updated</h2>
          <div class="systems-updated-row">
            <p id="systemsGeneratedAt" class="systems-updated-ts hint">—</p>
            <button type="button" id="systemsRefreshBtn" class="systems-refresh-btn">Refresh</button>
          </div>
        </div>
      </div>
      <p id="loginStatus" role="status"></p>
      <div class="systems-build-repo-row">
        <div id="systemsRepo" class="systems-repo-block"></div>
        <div id="systemsBuild" class="systems-build-block"></div>
      </div>
      <div id="systemsHost" class="systems-host-block"></div>
      <div id="systemsClients" class="systems-clients-block"></div>
      <div id="systemsRoutes" class="systems-routes-block"></div>
      <div id="systemsCert" class="systems-cert-block"></div>
      <div id="systemsOciResources" class="systems-oci-block"></div>
    </section>
  </div>
  <script src="/shared/dom-utils.js?v=20260611c"></script>
  <script src="/shared/admin-systems.js?v=20260620d"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const idpBlock = document.getElementById('idpBlock');
    const pinBlock = document.getElementById('pinBlock');
    const pinDivider = document.getElementById('pinDivider');
    const idpLink = document.getElementById('idpLoginLink');
    const loginHint = document.getElementById('loginHint');
    const loginCard = document.getElementById('loginCard');
    const signInPanel = document.getElementById('signInPanel');
    const systemsPanel = document.getElementById('systemsPanel');
    const loginStatusEl = document.getElementById('loginStatus');
    const forceLogin = new URLSearchParams(window.location.search).has('reauth');

    function setLoginStatus(message, isError = false) {
      if (!loginStatusEl) return;
      loginStatusEl.textContent = message || '';
      loginStatusEl.style.color = isError ? 'var(--danger)' : 'var(--muted)';
    }

    let activeLoginTab = 'signin';

    function switchLoginTab(tab) {
      activeLoginTab = tab;
      const signIn = tab === 'signin';
      document.querySelectorAll('.login-tab-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.loginTab === tab);
      });
      signInPanel.hidden = !signIn;
      systemsPanel.hidden = signIn;
      loginCard.classList.toggle('card-wide', !signIn);
      if (!signIn) {
        window.AdminSystems?.configure?.({ setStatus: setLoginStatus });
        window.AdminSystems?.activate?.();
      } else {
        window.AdminSystems?.deactivate?.();
        setLoginStatus('');
      }
    }

    document.querySelectorAll('.login-tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => switchLoginTab(btn.dataset.loginTab));
    });

    if (new URLSearchParams(window.location.search).get('tab') === 'systems') {
      switchLoginTab('systems');
    }

    fetch('/api/admin/session', { credentials: 'same-origin' })
      .then((r) => r.json())
      .then((data) => {
        if (data.ok && !forceLogin) {
          const tab = new URLSearchParams(window.location.search).get('tab');
          const next = tab === 'systems' ? '/admin/?tab=systems' : '/admin/';
          window.location.replace(next);
          return;
        }
        if (data.idpEnabled) {
          idpBlock.hidden = false;
          if (data.idpLoginUrl) {
            idpLink.href = `${data.idpLoginUrl}?prompt=login`;
          }
        }
        if (data.pinAllowed !== false) {
          pinBlock.hidden = false;
          if (data.idpEnabled) pinDivider.hidden = false;
        } else if (data.idpEnabled && data.idpLoginUrl && !data.ok) {
          loginHint.textContent = 'Redirecting to Oracle sign-in…';
          window.location.replace(`${data.idpLoginUrl}?prompt=login`);
          return;
        }
        if (data.idpEnabled && !data.pinAllowed) {
          loginHint.textContent = 'Sign in with your Oracle store account.';
        } else if (data.idpEnabled) {
          loginHint.textContent = 'Sign in with Oracle or the admin PIN.';
        } else {
          loginHint.textContent = 'Enter the admin PIN to manage store data.';
        }
      })
      .catch(() => {
        pinBlock.hidden = false;
        loginHint.textContent = 'Enter the admin PIN to manage store data.';
      });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const pin = document.getElementById('pin').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ pin }),
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || 'Sign-in failed');
        const next = activeLoginTab === 'systems' ? '/admin/?tab=systems' : '/admin/';
        window.location.replace(next);
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>

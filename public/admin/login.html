<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="screen-orientation" content="landscape">
  <title>Admin sign in — Cloud Store 893</title>
  <script src="/admin/admin-orientation.js"></script>
  <style>
    :root {
      --bg: #faf3df;
      --panel: #fff;
      --accent: #872434;
      --accent-2: #114b5f;
      --danger: #b42318;
      --text: #1f2937;
      --muted: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #e5e7eb;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.25rem;
      color: var(--accent);
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--accent-2);
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .portrait-blocker {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px;
      text-align: center;
      background: var(--bg);
      color: var(--text);
    }
    .portrait-blocker p { margin: 0; max-width: 280px; font-size: 1.1rem; }
    .portrait-blocker span { font-size: 2.5rem; }
    @media (orientation: portrait) {
      .portrait-blocker { display: flex; }
      body.admin-landscape > :not(.portrait-blocker) { visibility: hidden; }
    }
  </style>
</head>
<body class="admin-landscape">
  <div id="portraitBlocker" class="portrait-blocker" role="dialog" aria-label="Rotate device">
    <span aria-hidden="true">↻</span>
    <p>Rotate your device to <strong>landscape</strong> to use Admin.</p>
  </div>
  <form class="card" id="loginForm">
    <h1>Admin sign in</h1>
    <p>Enter the admin PIN to manage store data.</p>
    <label for="pin">Admin PIN</label>
    <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required>
    <p id="error" style="color: var(--danger); min-height: 1.2em; margin-top: 10px; margin-bottom: 0;"></p>
    <button type="submit">Sign in</button>
  </form>
  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    fetch('/api/admin/session', { credentials: 'same-origin' })
      .then((r) => r.json())
      .then((data) => {
        if (data.ok) window.location.replace('/admin/');
      })
      .catch(() => {});

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      const pin = document.getElementById('pin').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ pin }),
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || 'Sign-in failed');
        window.location.replace('/admin/');
      } catch (err) {
        errorEl.textContent = err.message;
      }
    });
  </script>
</body>
</html>
